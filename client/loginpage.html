<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Document</title>
</head>

<body>
    <div id="container">
        <div id="navbar">
            <div id="invisible">
                <a href="index.html"><img src="deluxicon.png" alt="" class="deluxicon"></a>
            </div>
            <a href="loginpage.html">
                <div id="buttonLogin">
                    <h2 class="buttonloginnav">LOGIN</h2>
                </div>
            </a>

            <a href="sign-in.html">
                <div id="buttonCad">
                    <h2 class="buttonloginnav">CADASTRAR</h2>
                </div>
            </a>

        </div>
        <br><br><br><br><br><br><br>
        <h2 class="textlogin">Faça seu login!</h2>
        <p class="textlogin">participe desse mundo!</p>
        <div id="imglogin">
            <img src="imagelogin.jpg" alt="" class="imagelogin">
        </div>

        <div id="logincamp">
            <form action="log">
                <fieldset>
                    <div class="fieldlogin">
                        <label for="name">
                            <input type="text" required placeholder=" Usuario"></label>
                        <center>
                            <hr>
                        </center>
                        <label for="password">
                            <input type="password" required placeholder=" Senha"><br><a href=""
                                class="passforgot">Esqueci minha
                                senha</a>
                        </label>
                        <center>
                            <br>
                            <hr>
                        </center>

                        <label for="confirmpassword">
                            <input type="password" required placeholder=" Confirme sua senha">
                        </label>
                    </div>
                </fieldset>
            </form>
            <div id="confirmcamp">

                <br><br>
                <center><button type="submit" class="confirm">CONFIRMAR</button></center>

                <center><a href="sign-in.html"><button type="submit" class="cad">CADASTRAR</button></a></center>
            </div>
        </div>
        <br>

        <br>
        <br>
    </div>

    <div id="containerdown">

    </div>
</body>

</html>
